run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - misspell
    - gosec

linters-settings:
  gosec:
    excludes:
      - G402  # TLS MinVersion — intentional in channel code
      - G501  # Weak crypto — not used here

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - gosec
        - errcheck
